<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Delete Product</title>

  <!-- Correct paths -->
  <link rel="stylesheet" href="styledel.css" />
</head>

<body>
  <div class="container">
    <h1>Delete Product</h1>

    <form id="deleteProductForm">
      <select id="productSelect" required>
        <option value="">Select a product to delete</option>
      </select>
      <button type="submit">Delete Product</button>
    </form>

    <button onclick="window.location.href='admin-dashboard.html'">
      Back to Dashboard
    </button>
  </div>

  <script>
    const token = localStorage.getItem("token");

    // Optional frontend role check
    if (localStorage.getItem("role") !== "admin") {
      alert("Access denied");
      window.location.href = "index.html";
    }

    async function loadProducts() {
      try {
        const response = await fetch("https://smartstock-backend-4.onrender.com/products", {
          headers: {
            "Authorization": "Bearer " + token
          }
        });
        const products = await response.json();
        const select = document.getElementById("productSelect");

        products.forEach(product => {
          const option = document.createElement("option");
          option.value = product._id;
           option.textContent = `${product.name} `;
          select.appendChild(option);
        });
      } catch (err) {
        alert("Error loading products");
        console.error(err);
      }
    }

    document.getElementById("deleteProductForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const productId = document.getElementById("productSelect").value;

      if (!productId) {
        alert("Please select a product");
        return;
      }

      if (!confirm("Are you sure you want to delete this product?")) {
        return;
      }

      try {
        const response = await fetch(`https://smartstock-backend-4.onrender.com/products/${productId}`, {
          method: "DELETE",
          headers: {
            "Authorization": "Bearer " + token
          }
        });

        const result = await response.json();

        if (response.ok) {
          alert("Product deleted successfully!");
          // Reload products
          document.getElementById("productSelect").innerHTML = '<option value="">Select a product to delete</option>';
          loadProducts();
        } else {
          alert("Error: " + result.error);
        }

      } catch (err) {
        alert("Error deleting product");
        console.error(err);
      }
    });

    loadProducts();
  </script>
</body>
</html>
