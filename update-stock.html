<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Update Stock</title>
  <link rel="stylesheet" href="style1.css" />
</head>
<body>
  <div class="container">
    <h1>Update Product Stock</h1>

    <form id="update-stock-form">
      <div class="form-group">
        <label for="product-select">Select Product:</label>
        <select id="product-select" required>
          <option value="">Loading products...</option>
        </select>
      </div>

      <div class="form-group">
        <label for="current-stock">Current Stock:</label>
        <input type="number" id="current-stock" readonly />
      </div>

      <div class="form-group">
        <label for="new-stock">New Stock Quantity:</label>
        <input type="number" id="new-stock" required min="0" />
      </div>

      <div class="form-group">
        <label for="notes">Notes (optional):</label>
        <textarea id="notes" rows="3" placeholder="Reason for stock update"></textarea>
      </div>

      <button type="submit">Update Stock</button>
    </form>

    <button onclick="window.location.href='admin-dashboard.html'">Back to Dashboard</button>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) {
      window.location.href = 'index.html';
    }

    // Load products
    async function loadProducts() {
      try {
        if (!token) {
          alert('No authentication token. Please login first.');
          window.location.href = 'index.html';
          return;
        }

        const response = await fetch('https://smartstock-backend-4.onrender.com/products', {
          method: 'GET',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          }
        });

        console.log('Products response status:', response.status);
        const data = await response.json();
        console.log('Products data:', data);

        if (response.ok) {
          const products = data;
          const select = document.getElementById('product-select');
          select.innerHTML = '<option value="">Select a product</option>';

          if (Array.isArray(products) && products.length > 0) {
            products.forEach(product => {
              const option = document.createElement('option');
              option.value = product._id;
              option.textContent = `${product.name} (${product.stock} in stock)`;
              option.dataset.stock = product.stock;
              select.appendChild(option);
            });
          } else {
            const option = document.createElement('option');
            option.textContent = 'No products available';
            option.disabled = true;
            select.appendChild(option);
          }
        } else {
          const errorMsg = data.error || data.message || 'Failed to load products';
          console.error('Error response:', data);
          alert('Error: ' + errorMsg);
        }
      } catch (error) {
        console.error('Error loading products:', error);
        alert('Error loading products: ' + error.message + '\n\nMake sure:\n1. Flask server is running\n2. MongoDB is running\n3. You are logged in');
      }
    }

    // Update current stock display when product is selected
    document.getElementById('product-select').addEventListener('change', function() {
      const selectedOption = this.options[this.selectedIndex];
      const currentStock = selectedOption.dataset.stock || '';
      document.getElementById('current-stock').value = currentStock;
    });

    // Handle form submission
    document.getElementById('update-stock-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      const productId = document.getElementById('product-select').value;
      const newStock = parseInt(document.getElementById('new-stock').value);
      const notes = document.getElementById('notes').value;

      if (!productId) {
        alert('Please select a product');
        return;
      }

      try {
        const response = await fetch(`https://smartstock-backend-4.onrender.com/products/${productId}/stock`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            stock: newStock,
            notes
          })
        });

        if (response.ok) {
          const result = await response.json();
          alert('Stock updated successfully!');
          // Reload products to show updated stock
          loadProducts();
          // Clear form
          document.getElementById('new-stock').value = '';
          document.getElementById('notes').value = '';
          document.getElementById('current-stock').value = '';
          document.getElementById('product-select').value = '';
        } else {
          const error = await response.json();
          alert('Error updating stock: ' + error.error);
        }
      } catch (error) {
        console.error('Error updating stock:', error);
        alert('Error updating stock');
      }
    });

    // Load products on page load
    loadProducts();
  </script>
</body>
</html>
