  <div class="page-wrapper">
    <div class="card">
      <h1>Add New Product</h1>

      <form id="addProductForm" class="form-grid">

        <div class="form-group">
          <label>Product Name</label>
          <input type="text" id="name" required />
        </div>

        <div class="form-group">
          <label>Category</label>
          <input type="text" id="category" required />
        </div>

        <div class="form-group">
          <label>Supplier</label>
          <input type="text" id="supplier" required />
        </div>

        <div class="form-group">
          <label>SKU</label>
          <input type="text" id="sku" required />
        </div>

        <div class="form-group">
          <label>Price (₹)</label>
          <input type="number" id="price" required />
        </div>

        <div class="form-group">
          <label>Quantity</label>
          <input type="number" id="quantity" required />
        </div>

        <div class="form-group full-width warning">
          <label>Low Stock Limit</label>
          <input type="number" id="lowStockLimit" required />
          <small>Alert when stock goes below this value</small>
        </div>

        <div class="form-actions full-width">
          <button type="submit" class="primary-btn">Add Product</button>
          <button type="button" class="secondary-btn"
            onclick="window.location.href='admin-dashboard.html'">
            Back
          </button>
        </div>

      </form>
    </div>
  </div>

  <script>
    const token = localStorage.getItem("token");

    // Optional frontend role check
    if (localStorage.getItem("role") !== "admin") {
      alert("Access denied");
      window.location.href = "login.html";
    }

    document.getElementById("addProductForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const productData = {
        name: document.getElementById("name").value,
        category: document.getElementById("category").value,
        supplier: document.getElementById("supplier").value,
        sku: document.getElementById("sku").value,
        price: Number(document.getElementById("price").value),
        stock: Number(document.getElementById("quantity").value),
        lowStockLimit: Number(document.getElementById("lowStockLimit").value)
      };

      try {
        if (!token) {
          alert('No authentication token. Please login first.');
          window.location.href = 'index.html';
          return;
        }

        console.log('Adding product:', productData);
        const response = await fetch("https://smartstock-backend-4.onrender.com/products", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify(productData)
        });

        console.log('Add product response status:', response.status);
        const result = await response.json();
        console.log('Add product result:', result);

        if (response.ok) {
          alert("Product added successfully!");
          document.getElementById("addProductForm").reset();
          // Redirect back to dashboard after successful add
          setTimeout(() => {
            window.location.href = 'admin-dashboard.html';
          }, 1000);
        } else {
          const errorMsg = result.error || result.message || 'Failed to add product';
          alert("Error: " + errorMsg);
          console.error('Error response:', result);
        }

      } catch (err) {
        alert("Error adding product: " + err.message + "\n\nMake sure Flask server is running on port 3000");
        console.error(err);
      }
    });
  </script>
</body>
</html>
