<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Manage Employees</title>
  <link rel="stylesheet" href="styleman.css" />
</head>
<body>
  <div class="container">
    <h1>Manage Users</h1>
<button onclick="openAddUserModal()">+ Add User</button>

    <div id="users-list">
      <!-- Users will be loaded here -->
    </div>
    <button onclick="window.location.href='admin-dashboard.html'">Back to Dashboard</button>
  </div>

  <!-- Modal for editing user -->
  <div id="edit-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Edit User</h2>
      <form id="edit-user-form">
        <input type="hidden" id="edit-user-id">
        <label for="edit-firstname">First Name:</label>
        <input type="text" id="edit-firstname" required>

        <label for="edit-email">Email:</label>
        <input type="email" id="edit-email" required>

        <label for="edit-role">Role:</label>
        <select id="edit-role" required>
          <option value="employee">Employee</option>
          <option value="admin">Admin</option>
        </select>

        <button type="submit">Update User</button>
      </form>
    </div>
  </div>

  <!-- Modal for adding user -->
   <div id="add-modal" class="modal" style="display:none;">
  <div class="modal-content">
    <span class="close" onclick="closeAddModal()">&times;</span>
    <h2>Add User</h2>

    <form id="add-user-form">
      <label>First Name:</label>
      <input type="text" id="add-firstname" required>

      <label>Email:</label>
      <input type="email" id="add-email" required>

      <label>Password:</label>
      <input type="password" id="add-password" required>

      <label>Role:</label>
      <select id="add-role">
        <option value="employee">Employee</option>
        <option value="admin">Admin</option>
      </select>

      <button type="submit">Create User</button>
    </form>
  </div>
</div>


  <script>
    const token = localStorage.getItem("token");

    // Check if admin
    if (localStorage.getItem("role") !== "admin") {
      alert("Access denied");
      window.location.href = "index.html";
    }

    async function loadUsers() {
      try {
        if (!token) {
          alert('No authentication token. Please login first.');
          window.location.href = 'index.html';
          return;
        }

        console.log('Fetching users...');
        const response = await fetch("http://localhost:3000/users", {
          method: 'GET',
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          }
        });

        console.log('Users response status:', response.status);
        const users = await response.json();
        console.log('Users data:', users);
        
        const list = document.getElementById("users-list");

        if (!Array.isArray(users) || users.length === 0) {
          list.innerHTML = "<p>No users found.</p>";
          return;
        }

        const table = document.createElement("table");
        table.innerHTML = `
          <thead>
            <tr>
              <th>First Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${users.map(u => `
              <tr>
                <td>${u.firstname || 'N/A'}</td>
                <td>${u.email || 'N/A'}</td>
                <td>${u.role || 'N/A'}</td>
                <td>
                  <button onclick="editUser('${u._id}', '${u.firstname}', '${u.email}', '${u.role}')">Edit</button>
                  <button onclick="deleteUser('${u._id}')">Delete</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        `;
        list.appendChild(table);
      } catch (error) {
        console.error("Error loading users:", error);
        document.getElementById("users-list").innerHTML = "<p>Error loading users: " + error.message + ". Make sure Flask server is running.</p>";
      }
    }

    loadUsers();

    // Modal functionality
    const modal = document.getElementById("edit-modal");
    const closeBtn = document.getElementsByClassName("close")[0];

    closeBtn.onclick = function() {
      modal.style.display = "none";
    }

    window.onclick = function(event) {
      if (event.target == modal) {
        modal.style.display = "none";
      }
    }

    function editUser(id, firstname, email, role) {
      document.getElementById("edit-user-id").value = id;
      document.getElementById("edit-firstname").value = firstname;
      document.getElementById("edit-email").value = email;
      document.getElementById("edit-role").value = role;
      modal.style.display = "block";
    }

    document.getElementById('edit-user-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const userId = document.getElementById('edit-user-id').value;
      const userData = {
        firstname: document.getElementById('edit-firstname').value,
        email: document.getElementById('edit-email').value,
        role: document.getElementById('edit-role').value
      };

      try {
        const response = await fetch(`http://localhost:3000/users/${userId}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(userData)
        });

        const result = await response.json();
        if (response.ok) {
          alert('User updated successfully!');
          modal.style.display = "none";
          loadUsers(); // Reload the list
        } else {
          alert('Error: ' + result.error);
        }
      } catch (error) {
        alert('Error updating user: ' + error.message);
      }
    });

    async function deleteUser(userId) {
      if (!confirm('Are you sure you want to delete this user?')) return;

      try {
        const response = await fetch(`http://localhost:3000/users/${userId}`, {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        const result = await response.json();
        if (response.ok) {
          alert('User deleted successfully!');
          loadUsers(); // Reload the list
        } else {
          alert('Error: ' + result.error);
        }
      } catch (error) {
        alert('Error deleting user: ' + error.message);
      }
    }
    function openAddUserModal() {
  document.getElementById("add-modal").style.display = "block";
}

function closeAddModal() {
  document.getElementById("add-modal").style.display = "none";
}

document.getElementById("add-user-form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const userData = {
    firstname: document.getElementById("add-firstname").value,
    email: document.getElementById("add-email").value,
    password: document.getElementById("add-password").value,
    role: document.getElementById("add-role").value
  };

  try {
    const response = await fetch("http://localhost:3000/users", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify(userData)
    });

    const result = await response.json();

    if (response.ok) {
      alert("Employee added successfully!");
      closeAddModal();
      loadUsers(); // 🔄 refresh list
      document.getElementById("add-user-form").reset();
    } else {
      alert(result.error || "Failed to add user");
    }
  } catch (error) {
    alert("Error: " + error.message);
  }
});

  </script>

  <style>
    .modal {
      display: none;
      position: fixed;
      z-index: 1;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgb(0,0,0);
      background-color: rgba(0,0,0,0.4);
    }

    .modal-content {
      background-color: #fefefe;
      margin: 15% auto;
      padding: 20px;
      border: 1px solid #888;
      width: 80%;
      max-width: 500px;
    }

    .close {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
    }

    .close:hover,
    .close:focus {
      color: black;
      text-decoration: none;
      cursor: pointer;
    }
  </style>
</body>
</html>
