<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>View Transactions</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="dashboard">
    <h1>Transaction History</h1>
    <div id="transactions-list">
      <!-- Transactions will be loaded here -->
    </div>
    <button onclick="window.location.href='admin-dashboard.html'">Back to Dashboard</button>
  </div>

  <script>
    const token = localStorage.getItem("token");

    // Check if logged in
    if (!token) {
      alert("Please login first");
      window.location.href = "index.html";
    }

    async function loadTransactions() {
      try {
        if (!token) {
          alert("Please login first");
          window.location.href = "index.html";
          return;
        }

        console.log('Fetching transactions...');
        const response = await fetch("https://smartstock-backend-4.onrender.com/transactions", {
          method: 'GET',
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          }
        });

        console.log('Transactions response status:', response.status);
        
        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || 'Failed to load transactions');
        }

        const transactions = await response.json();
        console.log('Transactions data:', transactions);
        
        const list = document.getElementById("transactions-list");

        if (!Array.isArray(transactions) || transactions.length === 0) {
          list.innerHTML = "<p>No transactions found.</p>";
          return;
        }

        const table = document.createElement("table");
        table.innerHTML = `
          <thead>
            <tr>
              <th>Product ID</th>
              <th>Type</th>
              <th>Quantity</th>
              <th>User ID</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${transactions.map(t => `
              <tr>
                <td>${t.productId || 'N/A'}</td>
                <td>${t.type || 'N/A'}</td>
                <td>${t.quantity || 'N/A'}</td>
                <td>${t.userId || 'N/A'}</td>
                <td>${t.createdAt ? new Date(t.createdAt).toLocaleString() : 'N/A'}</td>
                <td>
                  <button onclick="deleteTransaction('${t._id}')">Delete</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        `;
        list.appendChild(table);
      } catch (error) {
        console.error("Error loading transactions:", error);
        document.getElementById("transactions-list").innerHTML = "<p>Error loading transactions: " + error.message + "</p>";
      }
    }
    
async function deleteTransaction(id) {
  if (!confirm("Are you sure you want to delete this transaction?")) {
    return;
  }

  try {
    const response = await fetch(
      `https://smartstock-backend-4.onrender.com/transactions/${id}`,
      {
        method: "DELETE",
        headers: {
          "Authorization": "Bearer " + localStorage.getItem("token")
        }
      }
    );

    const result = await response.json();

    if (response.ok) {
      alert("Transaction deleted");
      document.getElementById("transactions-list").innerHTML = "";
      loadTransactions(); // 🔄 refresh UI
    } else {
      alert(result.error || "Failed to delete");
    }
  } catch (error) {
    console.error("Delete error:", error);
  }
}


    loadTransactions();
  </script>
</body>
</html>
