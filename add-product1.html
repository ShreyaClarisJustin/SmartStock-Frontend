<body>
  <div class="dashboard">
    <h1>Add New Product</h1>

    <form id="addProductForm">
  <input type="text" id="name" placeholder="Product Name" required />
  <input type="text" id="category" placeholder="Category" required />
  <input type="text" id="supplier" placeholder="Supplier" required />
  <input type="text" id="sku" placeholder="SKU" required />
  <input type="number" id="price" placeholder="Price" required />
  <input type="number" id="quantity" placeholder="Quantity" required />
  <input type="number" id="lowStockLimit" placeholder="Low Stock Limit" required />
  <button type="submit">Add Product</button>
</form>

    <button onclick="window.location.href='admin-dashboard.html'">Back to Dashboard</button>
  </div>

  <script>
    const token = localStorage.getItem("token");

    document.getElementById('add-product-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const productData = {
        name: document.getElementById('name').value,
        description: document.getElementById('description').value,
        price: parseFloat(document.getElementById('price').value),
        stock: parseInt(document.getElementById('stock').value),
        category: document.getElementById('category').value
      };

      try {
        const response = await fetch('http://localhost:3000/products', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(productData)
        });

        const result = await response.json();
        if (response.ok) {
          alert('Product added successfully!');
          document.getElementById('add-product-form').reset();
        } else {
          alert('Error: ' + result.error);
        }
      } catch (error) {
        alert('Error adding product: ' + error.message);
      }
    });
  </script>
</body>
